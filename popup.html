<!doctype html>
<html>
  <head>
    <style>
      /* 1. GLOBAL RESET: Protects all element width/height measurements */
      *,
      *:before,
      *:after {
        box-sizing: border-box;
      }

      body {
        width: 180px;
        padding: 12px;
        font-family: monospace;
        background: #222222;
        color: #eee;
        margin: 0;
      }
      .title {
        font-weight: bold;
        color: #60a5fa;
        margin-bottom: 12px;
        text-align: center;
        border-bottom: 1px solid #333;
        padding-bottom: 4px;
      }
      .flex {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .switch {
        position: relative;
        display: inline-block;
        width: 34px;
        height: 20px;
        flex-shrink: 0; /* FIXED: Prevents flexbox from flattening the switch */
      }

      /* 2. LAYOUT FIX: Rips the ghost element completely out of the document flow */
      .switch input {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
        margin: 0; /* Clears hidden browser spacing defaults */
      }

      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #333333;
        transition: 0.3s;
        border-radius: 20px;
      }
      input:checked + .slider {
        background-color: #666666;
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 14px;
        width: 14px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: 0.3s;
        border-radius: 50%;
      }
      input:checked + .slider:before {
        transform: translateX(14px);
      }
    </style>
  </head>
  <body>
    <div class="title">ENGINE PANEL</div>
    <div class="flex">
      <span>Power Status:</span>
      <label class="switch">
        <input type="checkbox" id="engineToggle" checked />
        <span class="slider"></span>
      </label>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
